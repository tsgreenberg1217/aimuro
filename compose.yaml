services:
  pgvector:
    image: 'pgvector/pgvector:pg16'
    environment:
      - 'POSTGRES_DB=gundam-tcg-rules'
      - 'POSTGRES_USER=user'
      - 'POSTGRES_PASSWORD=password'
      - 'POSTGRES_HOST_AUTH_METHOD=trust'
    labels:
      - "org.springframework.boot.service-connection=postgres"
    ports:
      - '5432:5432'
